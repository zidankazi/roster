# Per-agent detection rules — the shipped defaults for roster.
#
# New agents are added here as data, not code. Patterns are regular
# expressions evaluated against the visible grid rows (trailing whitespace
# trimmed), bottom rows first; within a state, patterns are tried in the
# order listed. Priority when several states match: blocked > working > idle.
# See docs/02-state-detection.md.
#
# The claude-code patterns are tuned against Claude Code 2.1 captured live
# (see crates/roster/examples/capture.rs). Its permission prompts show
# "Do you want to proceed?" over a "❯ 1. Yes" menu; while working it shows
# "esc to interrupt"; at rest the input line is "❯" between horizontal
# rules (not a box-bordered "> ").

[claude-code]
match_command = ["claude"]
# launch_command sets the exact command the launcher runs — flags included.
# Without it, the first match_command binary is launched bare.
# launch_command = "claude --dangerously-skip-permissions"
blocked = ['Do you want to proceed\?', 'Allow .*\?', '❯ \d+\. Yes']
working = ['esc to interrupt', '(?i)ctrl\+c to interrupt']
idle    = ['^❯']                                              # input prompt line
reason.blocked = "matched_line"
reason.working = "last_nonempty"
# Skip UI chrome so a working/done reason is real content (e.g. the spinner
# status or the last result line), not the model status bar, the input
# prompt, or the interrupt/shortcut hints.
reason.ignore = ['^\s*●', 'to interrupt', '\? for shortcuts', '^\s*⎿', '^\s*❯', '^\s*▎']
done.after_activity_secs = 8

[codex]
match_command = ["codex"]
blocked = ['Approve this command\?', 'Allow\?']
working = ['Running', '\bthinking\b']
# rows are matched with trailing whitespace trimmed, so the prompt pattern
# ends in \s*$ rather than a literal trailing space
idle    = ['^\S+ ❯\s*$']
reason.blocked = "matched_line"
done.after_activity_secs = 6

[aider]
match_command = ["aider"]
blocked = ['\(Y\)es/\(N\)o', 'Add .* to the chat\?']
working = ['Applying edit', 'Committing']
idle    = ['^>\s*$']
reason.blocked = "matched_line"
done.after_activity_secs = 5
