# Detection rules for roster — Claude Code only.
#
# roster is built exclusively for Claude Code: this is the single shipped agent,
# tuned and verified against live sessions. Rules are data, not code. Patterns
# are regular
# expressions evaluated against the visible grid rows (trailing whitespace
# trimmed), bottom rows first; within a state, patterns are tried in the
# order listed. Priority when several states match: blocked > working > idle.
# See docs/02-state-detection.md.
#
# The claude-code patterns are tuned against Claude Code 2.1 captured live
# (see crates/roster/examples/capture.rs; latest capture 2.1.209). Its
# permission prompts show "Do you want to proceed?" over a "❯ 1. Yes" menu;
# while working it shows a spinner status line ("✻ Crunching…", a random
# verb, or a multi-word live task description on 2.1.207) — 2.1.205 no
# longer reliably shows "esc to interrupt" with it, so the spinner line
# itself is a working signal; at rest the input line is "❯"
# between horizontal rules (not a box-bordered "> "). When a backgrounded
# task is running it shows "✳ Waiting for N background agent(s) to finish"
# above the prompt, with the background-task tray ("Enter to view · x to
# stop") below it.

[claude-code]
match_command = ["claude"]
# launch_command sets the exact command the launcher runs — flags included.
# Without it, the first match_command binary is launched bare.
# launch_command = "claude --dangerously-skip-permissions"
# Order matters: earlier patterns win the reason, so "Do you want to proceed?"
# must outrank the "❯ N. Yes" menu row rendered beneath it. All three are
# anchored to the row shapes of the real dialog (leading space, row ends at
# the match — trailing whitespace is trimmed before matching): a settled
# response quoting permission-prompt text mid-sentence ("...blocked ·
# Allow Bash(cargo test)?, then...") must not match; only a row that IS the
# dialog row may. The menu pattern gets no end anchor: on the live 2.1.209
# dialog the options read "Yes" / "Yes, and always allow access to
# roster/ from this project", so moving the selection puts the longer text
# on the ❯ row — end-anchoring it would break that. The three stay layered:
# a wrapped Allow-question row can miss the question pattern while the menu
# row still catches the dialog.
blocked = ['^\s*Do you want to proceed\?$', '^\s*Allow .*\?$', '^\s*❯ \d+\. Yes']
# The interrupt hints are end-anchored (optionally through a closing paren)
# for the same reason the blocked patterns are: a real hint row ends at
# "interrupt" ("✶ Flowing… esc to interrupt", standalone "  esc to
# interrupt") or at "interrupt)" in the "(… esc to interrupt)" livery, while
# a settled response quoting that text carries prose past it ("(esc to
# interrupt), the three", "(esc to interrupt), end") — accepted residual: a
# quote that happens to end its row right there, shaped exactly like the
# real hint, stays indistinguishable, same as the spinner-quote case below.
#
# "Waiting for N background agent(s) to finish" is a genuine working state:
# the main thread has yielded its spinner while a backgrounded task runs, so
# there is no "esc to interrupt" and the idle prompt is on screen. Without
# this, the settled prompt reads as done, then flips back to working when the
# background task reports — a confusing done↔working flicker. working
# outranks idle, so this pins the pane to working until the wait is actually
# over.
#
# The last pattern is the spinner status line itself ("✻ Sautéing…",
# "✻ Crunching… (4s · thinking with high effort)"): since 2.1.205 a working
# screen can show no interrupt hint at all, leaving the spinner as the only
# on-screen working signal. On 2.1.207 the status text can be several
# words — an in-progress task's live description (working_task_status.txt)
# — not just the random verb, so the pattern accepts word-run text from
# the glyph to the first "…"; without the multi-word arm such a frame
# matches nothing and the pane flickers working→done→working mid-task.
# The line must END at that ellipsis or at a following " (elapsed/tokens"
# suffix: a real spinner row has nothing else after the "…", while a
# settled response line *mentioning* a spinner ("✻ the spinner shows
# Crunching… while it works") carries prose there — without the tail
# anchor such a line would pin a false working, which never clears. A
# verbatim spinner-shaped quote (glyph + text + "…" at end of row) remains
# indistinguishable from a live spinner by shape — accepted residual, same
# as it always was for one-word quotes. A status long enough to wrap in a
# narrow pane puts the "…" on a glyph-less continuation row and matches
# nothing (captured live, 50 cols); the change signal covers it while the
# glyph animates. The glyph class is the captured flower frames (✻ ✢ ✶
# live in 2.1.20x, ✳ live 2.1.207 task-status and earlier flourish
# captures) and nothing looser: a bare "*" or "·" would match markdown
# bullets in settled responses ("* Loading…"). The braille livery
# ("⠹ Reticulating…") stays out for the same reason — its glyphs are the
# stock cli-spinner set, so settled output quoting any npm-style tool (or
# this repo's own fixtures) would pin a false working, while every braille
# capture so far came with an interrupt hint that already matches. The
# required "…" keeps the completion flourish ("✻ Brewed for 5s") from
# matching.
working = ['esc to interrupt\)?$', '(?i)ctrl\+c to interrupt\)?$', 'Waiting for \d+ background agent', '^\s*[✻✢✳✶] \S[^…]*…( \(.*)?$']
idle    = ['^❯']                                              # input prompt line
reason.blocked = "matched_line"
reason.working = "last_nonempty"
# Skip UI chrome so a working/done reason is real content (e.g. the last
# result line), not the model status bar, the input prompt, the
# interrupt/shortcut hints, the mode indicator, or the completion flourish
# ("✻ Cogitated for 2s" — a random verb, so the word is a wildcard; the
# glyph class must cover the same frames as the working spinner class,
# since the flourish freezes on whichever frame was showing).
reason.ignore = ['^\s*●', 'to interrupt', '\? for shortcuts', '^\s*⎿', '^\s*❯', '^\s*▎', '^\s*[✻✢✳✶*] ?\w+ for \d+s$', '^\s*⏸', '^\s*Enter to view']
# Rows excluded from the change fingerprint (the "screen moved" working
# signal): the composer/prompt rows echo every keystroke of an unsent
# prompt and rotate their placeholder suggestion, the "● model · /effort"
# status chip toggles with focus, the horizontal rules bounding the
# composer shift a row when it grows — and the mode/hint/tray-hint lines
# ("⏸ manual mode on", "? for shortcuts", "Enter to view · x to stop")
# shift with it while their text never carries progress. None of that is
# the agent doing work; without this, typing a prompt into an idle pane
# reads as 🟡 working and stamps fake activity that widens the done window
# (issue #1). The chip pattern requires leading indentation: the chip is
# right-aligned, while genuine "● Task(…)" output rows sit at column 0 and
# must keep counting as activity — including the background-task tray's
# progress row below the composer.
activity.ignore = ['^\s*❯', '^\s+●', '^─+$', '^\s*⏸', '\? for shortcuts', 'Enter to view']
# The composer box proper: the bottom-most prompt row through the next
# rule — wrapped continuation rows of a long unsent prompt live in
# between, carry no ❯ of their own, and change on every keystroke, so a
# per-row pattern can't exclude them; the bottom-most ❯ anchors the region
# instead. Transcript echoes ("❯ old prompt") higher up never anchor it
# (the live composer row always sits below them), and rows *below* the box
# — the background-task tray — keep counting as activity.
activity.ignore_region = ['^\s*❯', '^─+$']
done.after_activity_secs = 8
